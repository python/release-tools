parameters:
  DoEmbed: false
  DoFreethreaded: false

jobs:
- job: Test_PyManager
  displayName: Test PyManager

  pool:
    vmImage: windows-2022

  workspace:
    clean: all

  strategy:
    matrix:
      win32:
        Name: win32
      amd64:
        Name: amd64
      win32_test:
        Name: win32_test
      amd64_test:
        Name: amd64_test
      ${{ if eq(parameters.DoEmbed, 'true') }}:
        win32_embed:
          Name: win32_embed
        amd64_embed:
          Name: amd64_embed
      ${{ if eq(parameters.DoFreethreaded, 'true') }}:
        win32_t:
          Name: win32_t
        amd64_t:
          Name: amd64_t

  steps:
  - checkout: none

  - download: current
    artifact: layout_pymanager_$(Name)
    displayName: 'Download artifact: layout_pymanager_$(Name)'

  - powershell: |
      $p = gi "$(Pipeline.Workspace)\layout_pymanager_$(Name)\python.exe"
      Write-Host "##vso[task.prependpath]$(Split-Path -Parent $p)"
    displayName: 'Add test Python to PATH'

  - script: |
      python -c "import sys; print(sys.version)"
    displayName: 'Collect version number'
    condition: and(succeeded(), not(variables['SkipTests']))

  - script: |
      python -m site
    displayName: 'Collect site'
    condition: and(succeeded(), not(variables['SkipTests']))

  - script: |
      python -m pip install "azure<0.10"
      python -m pip uninstall -y azure python-dateutil six
    displayName: 'Test (un)install package'
    condition: and(succeeded(), not(variables['SkipTests']))
